; PlatformIO Project Configuration File
; Ballistic Calculator - ESP32-WROOM-32
; https://docs.platformio.org/page/projectconf.html

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Flash configuration for ESP32-WROOM-32 (4MB)
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = min_spiffs.csv

; Build flags
build_flags =
    -std=gnu++17
    -O2
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=0

; Dependencies
lib_deps =
    Wire
    SPI
    WiFi
    WebServer
    Preferences
    ArduinoJson@^7.0.0
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1

; Unit test environment
[env:native]
platform = native
build_flags =
    -std=c++17
    -O2
    -Wall
    -Wextra
    -DNATIVE_BUILD
test_framework = unity
